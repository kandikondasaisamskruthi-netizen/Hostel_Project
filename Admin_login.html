<link rel="stylesheet" href="/static/style.css">

<div class="login-page">

    <div class="login-box">

        <h1>Admin Login</h1>
        <p>Use admin credentials</p>

        <form method="POST">

            <input 
                type="text" 
                name="username" 
                placeholder="Enter Username" 
                required
            >

            <input 
                type="password" 
                name="password" 
                placeholder="Enter Password" 
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>
