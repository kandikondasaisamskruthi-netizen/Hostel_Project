<!DOCTYPE html>
<html>
<head>
    <title>Weekly Food Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
</head>
<body>

<div class="menu-page">

    <div class="menu-box">
        <h1>Weekly Food Menu</h1>

        <table class="menu-table">
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Breakfast</th>
                    <th>Lunch</th>
                    <th>Dinner</th>
                </tr>
            </thead>

            <tbody>
                {% for item in menu_data %}
                <tr>
                    <td>{{ item[0] }}</td>
                    <td>{{ item[1] }}</td>
                    <td>{{ item[2] }}</td>
                    <td>{{ item[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>

        <a href="/student_dashboard" class="back-btn">
            Back
        </a>
    </div>

</div>

</body>
</html>
